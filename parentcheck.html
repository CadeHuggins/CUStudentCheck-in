<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CU Parental Check</title>
  <link rel="stylesheet" href="css/main.css" />

  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

  <div id="scanSuccess"></div>5
  4'
  2100

  <script>
    if (sessionStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <header class="header">
    <button class="menu-btn" id="openMenu" aria-label="Open menu">☰</button>
    <h1>Parental Check</h1>
  </header>

  <div class="overlay" id="overlay"></div>

  <nav class="sidemenu" id="sidemenu">
    <button class="close-btn" id="closeMenu">✕</button>

    <a href="index.html">Home</a>
    <a href="checkin.html">Check-In</a>
    <a href="checkout.html">Check-Out</a>
    <a href="parentcheck.html">Parental Check</a>
    <a href="addadult.html">Add Adult</a>

    <button onclick="logout()" class="logout-btn">Logout</button>
  </nav>

  <section class="Check-in">
  <br /><br />
    
  <label for="dlNumber">Driver License Number</label>
  <input type="text" id="dlNumber" placeholder="Enter full DL number" />

  <br /><br />

  <label>Scan Student QR Code</label>
  <div id="reader"></div>

  <br /><br />

  <label for="parentOutput">Output</label>
  <textarea id="parentOutput" rows="4" readonly></textarea>

  <br /><br />

  <button onclick="confirmPickup()">Confirm Pickup</button>

  <br /><br />

  <button onclick="storeStudent('John Smith 123456')">Test Student Scan</button>

</section>

  <script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFOqM2dcKAP8M3OHT576MdjoLOEKTtX5eFW92kr8wzM8mUYWM7NN3VC7kFYY7CiQO9/exec";

  let scannedStudent = "";
  let lastSubmittedPickup = "";

  function storeStudent(qrText) {
    scannedStudent = qrText;
    document.getElementById("parentOutput").value =
      `Student scanned: ${scannedStudent}`;
  }

  function confirmPickup() {
    const dlNumber = document.getElementById("dlNumber").value.trim();

    if (scannedStudent === "") {
      alert("Please scan a student QR code first.");
      return;
    }

    if (dlNumber === "") {
      alert("Please enter the driver license number.");
      return;
    }

    document.getElementById("parentOutput").value =
      "Checking authorized adult list...";

    verifyAdult(scannedStudent, dlNumber);
  }

  function verifyAdult(studentInfo, dlNumber) {
    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "verifyAdult",
        studentInfo: studentInfo,
        dlNumber: dlNumber
      })
    })
    .then(response => response.text())
    .then(result => {
      result = result.trim();

      if (result === "AUTHORIZED") {
        showParentResult(true);
        savePickup(studentInfo, dlNumber);
      } else {
        showParentResult(false);
      }
    })
    .catch(error => {
      console.error(error);
      document.getElementById("parentOutput").value =
        "Error checking authorized adult list.";
    });
  }

  function savePickup(studentInfo, dlNumber) {
    const time = new Date().toLocaleTimeString();
    const date = new Date().toLocaleDateString();
    const staffName = sessionStorage.getItem("staffName");

    document.getElementById("parentOutput").value =
      `${studentInfo} / DL ${dlNumber} / AUTHORIZED / ${time} / ${date} / ${staffName}`;

    sendParentCheck(studentInfo, dlNumber, time, date, "YES", staffName);
  }

  function sendParentCheck(studentInfo, dlNumber, time, date, authorized, staffName) {
    const pickupKey = `${studentInfo}-${dlNumber}-${authorized}`;

    if (lastSubmittedPickup === pickupKey) {
      return;
    }

    lastSubmittedPickup = pickupKey;

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        sheetName: "Parental/Guardian Checks",
        studentInfo: studentInfo,
        dlNumber: dlNumber,
        time: time,
        date: date,
        authorized: authorized,
        staffName: staffName
      })
    });
  }

  function showParentResult(isAuthorized) {
    const output = document.getElementById("parentOutput");

    if (isAuthorized) {
      output.value = "✅ AUTHORIZED PICKUP";
      output.style.backgroundColor = "#d4edda";
      output.style.color = "#155724";
    } else {
      output.value = "❌ NOT AUTHORIZED - DO NOT RELEASE STUDENT";
      output.style.backgroundColor = "#f8d7da";
      output.style.color = "#721c24";

      const time = new Date().toLocaleTimeString();
      const date = new Date().toLocaleDateString();
      const staffName = sessionStorage.getItem("staffName");
      const dlNumber = document.getElementById("dlNumber").value.trim();

      sendParentCheck(
        scannedStudent,
        dlNumber,
        time,
        date,
        "NO",
        staffName
      );
    }
  }

  function onScanSuccess(decodedText) {
    storeStudent(decodedText);
  }

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    onScanSuccess
  );

  const sidemenu = document.getElementById("sidemenu");
  const overlay = document.getElementById("overlay");
  const openBtn = document.getElementById("openMenu");
  const closeBtn = document.getElementById("closeMenu");

  openBtn.addEventListener("click", () => {
    sidemenu.classList.add("open");
    overlay.classList.add("show");
  });

  function closeMenu() {
    sidemenu.classList.remove("open");
    overlay.classList.remove("show");
  }

  function logout() {
    sessionStorage.removeItem("loggedIn");
    sessionStorage.removeItem("staffName");
    window.location.href = "login.html";
  }

  closeBtn.addEventListener("click", closeMenu);
  overlay.addEventListener("click", closeMenu);
</script>
</body>
</html>
