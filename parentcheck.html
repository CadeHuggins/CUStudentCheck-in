<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CU Parental Check</title>
  <link rel="stylesheet" href="css/main.css" />

  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

  <div id="scanSuccess"></div>

  <script>
    if (sessionStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <header class="header">
    <button class="menu-btn" id="openMenu" aria-label="Open menu">☰</button>
    <h1>Parental Check</h1>
  </header>

  <div class="overlay" id="overlay"></div>

  <nav class="sidemenu" id="sidemenu">
    <button class="close-btn" id="closeMenu">✕</button>

    <a href="index.html">Home</a>
    <a href="checkin.html">Check-In</a>
    <a href="checkout.html">Check-Out</a>
    <a href="parentcheck.html">Parental Check</a>
    <a href="addadult.html">Add Adult</a>

    <button onclick="logout()" class="logout-btn">Logout</button>
  </nav>

  <section class="Check-in">

  <label for="guardianName">Parent/Guardian Name</label>
  <input type="text" id="guardianName" placeholder="Enter parent/guardian name" />

  <br /><br />

  <label for="dlLast4">DL Last 4 Digits</label>
  <input type="text" id="dlLast4" maxlength="4" placeholder="Last 4 digits" />

  <br /><br />

  <label>Scan Student QR Code</label>
  <div id="reader"></div>

  <br /><br />

  <label for="parentOutput">Output</label>
  <textarea id="parentOutput" rows="4" readonly></textarea>

  <br /><br />

  <button onclick="confirmPickup()">Confirm Pickup</button>

  <br /><br />

  <button onclick="storeStudent('John Smith 123456')">Test Student Scan</button>

</section>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby36gxVRyLZZH1zYED6y0sq0sHHFMyg54Ihovf5BvLd7k8PUOKKDzuHgkShTm3y9qgo/exec";

    let scannedStudent = "";
    let lastSubmittedPickup = "";

    function storeStudent(qrText) {
      scannedStudent = qrText;
      document.getElementById("parentOutput").value =
        `Student scanned: ${scannedStudent}`;
    }

    function confirmPickup() {
      const guardianName = document.getElementById("guardianName").value.trim();
      const dlLast4 = document.getElementById("dlLast4").value.trim();

      if (scannedStudent === "") {
        alert("Please scan a student QR code first.");
        return;
      }

      if (guardianName === "") {
        alert("Please enter the parent/guardian name.");
        return;
      }

      if (!/^\d{4}$/.test(dlLast4)) {
        alert("Please enter exactly 4 digits for DL Last 4.");
        return;
      }

      document.getElementById("parentOutput").value = "Checking authorized adult list...";

        verifyAdult(scannedStudent, guardianName, dlLast4);
      }

      function verifyAdult(studentInfo, guardianName, dlLast4) {
        fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
        action: "verifyAdult",
        studentInfo: studentInfo,
        guardianName: guardianName,
        dlLast4: dlLast4
      })
      })
      .then(response => response.text())
      .then(result => {
        result = result.trim();
        console.log("VERIFY RESULT:", result);
        document.getElementById("parentOutput").value = "Verify result: " + result;

        if (result === "AUTHORIZED") {
          showParentResult(true);
          savePickup(studentInfo, guardianName, dlLast4);
        } else {
          showParentResult(false);
        }
      })
      .catch(error => {
        console.error(error);
        document.getElementById("parentOutput").value =
          "Error checking authorized adult list.";
      });
    }

    function savePickup(studentInfo, guardianName, dlLast4) {
      const time = new Date().toLocaleTimeString();
      const date = new Date().toLocaleDateString();
      const staffName = sessionStorage.getItem("staffName");

      document.getElementById("parentOutput").value =
        `${studentInfo} / ${guardianName} / DL ending ${dlLast4} / AUTHORIZED / ${time} / ${date} / ${staffName}`;

      sendParentCheck(
        studentInfo,
        guardianName,
        dlLast4,
        time,
        date,
        "YES",
        staffName
      );
    }

    function sendParentCheck(studentInfo, guardianName, dlLast4, time, date, authorized, staffName) {
      const pickupKey = `${studentInfo}-${guardianName}-${dlLast4}`;

      if (lastSubmittedPickup === pickupKey) {
        return;
      }

      lastSubmittedPickup = pickupKey;

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          sheetName: "Parental/Guardian Checks",
          studentInfo: studentInfo,
          guardianName: guardianName,
          dlLast4: dlLast4,
          time: time,
          date: date,
          authorized: authorized,
          staffName: staffName
        })
      });
    }

    function showParentResult(isAuthorized) {
      const output = document.getElementById("parentOutput");

      if (isAuthorized) {
        output.value = "✅ AUTHORIZED PICKUP";
        output.style.backgroundColor = "#d4edda";
        output.style.color = "#155724";
      } else {
        output.value = "❌ NOT AUTHORIZED - DO NOT RELEASE STUDENT";
        output.style.backgroundColor = "#f8d7da";
        output.style.color = "#721c24";

        const time = new Date().toLocaleTimeString();
        const date = new Date().toLocaleDateString();
        const staffName = sessionStorage.getItem("staffName");

        sendParentCheck(
          scannedStudent,
          document.getElementById("guardianName").value.trim(),
          document.getElementById("dlLast4").value.trim(),
          time,
          date,
          "NO",
          staffName
        );
      }
    }

    function onScanSuccess(decodedText) {
      storeStudent(decodedText);
    }

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );

    const sidemenu = document.getElementById("sidemenu");
    const overlay = document.getElementById("overlay");
    const openBtn = document.getElementById("openMenu");
    const closeBtn = document.getElementById("closeMenu");

    openBtn.addEventListener("click", () => {
      sidemenu.classList.add("open");
      overlay.classList.add("show");
    });

    function closeMenu() {
      sidemenu.classList.remove("open");
      overlay.classList.remove("show");
    }

    function logout() {
      sessionStorage.removeItem("loggedIn");
      sessionStorage.removeItem("staffName");
      window.location.href = "login.html";
    }

    closeBtn.addEventListener("click", closeMenu);
    overlay.addEventListener("click", closeMenu);
  </script>

</body>
</html>
